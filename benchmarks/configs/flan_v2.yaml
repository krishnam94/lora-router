# FLAN v2 48-Task LoRA Routing Benchmark
#
# Standard benchmark used by LORAUTER, LoraRetriever, ARROW, SpectR, LoraHub.
# 48 tasks, 10 clusters, 50 test samples per task (2,400 total).
# Pre-trained adapters: Styxxxx/llama2_7b_lora-{task_name} on HuggingFace.
# Base model: meta-llama/Llama-2-7b-hf (r=8, alpha=16, target: q_proj + v_proj)

name: flan_v2_48task
base_model: meta-llama/Llama-2-7b-hf
adapter_prefix: Styxxxx/llama2_7b_lora
samples_per_task: 50
total_samples: 2400

# Data source for test samples
data:
  hf_dataset: lorahub/flanv2
  # Fallback: combined_test.json from LoraRetriever repo
  local_path: benchmarks/data/combined_test.json

# LoRA training config (all adapters share this)
lora_config:
  r: 8
  alpha: 16
  target_modules: [q_proj, v_proj]
  dropout: 0.05

# Retriever encoder used by LORAUTER and LoraRetriever
reference_encoder: Styxxxx/lora_retriever

clusters:
  closed_book_qa:
    metric: exact_match
    tasks:
      - name: arc_challenge
        hf_id: Styxxxx/llama2_7b_lora-arc_challenge
        description: "AI2 Reasoning Challenge - hard science questions"
      - name: arc_easy
        hf_id: Styxxxx/llama2_7b_lora-arc_easy
        description: "AI2 Reasoning Challenge - easy science questions"
      - name: natural_questions
        hf_id: Styxxxx/llama2_7b_lora-natural_questions
        description: "Google Natural Questions - factoid QA from Wikipedia"
      - name: trivia_qa
        hf_id: Styxxxx/llama2_7b_lora-trivia_qa
        description: "TriviaQA - trivia questions with evidence documents"

  commonsense:
    metric: exact_match
    tasks:
      - name: copa
        hf_id: Styxxxx/llama2_7b_lora-copa
        description: "Choice of Plausible Alternatives - causal reasoning"
      - name: hellaswag
        hf_id: Styxxxx/llama2_7b_lora-hellaswag
        description: "HellaSwag - sentence completion with commonsense"
      - name: piqa
        hf_id: Styxxxx/llama2_7b_lora-piqa
        description: "Physical Intuition QA - physical commonsense"
      - name: story_cloze
        hf_id: Styxxxx/llama2_7b_lora-story_cloze
        description: "Story Cloze - choose correct story ending"

  coreference:
    metric: exact_match
    tasks:
      - name: definite_pronoun_resolution
        hf_id: Styxxxx/llama2_7b_lora-definite_pronoun_resolution
        description: "Definite pronoun resolution - identify referent"
      - name: wsc
        hf_id: Styxxxx/llama2_7b_lora-wsc
        description: "Winograd Schema Challenge - pronoun coreference"

  nli:
    metric: exact_match
    tasks:
      - name: anli_r1
        hf_id: Styxxxx/llama2_7b_lora-anli_r1
        description: "Adversarial NLI Round 1"
      - name: anli_r2
        hf_id: Styxxxx/llama2_7b_lora-anli_r2
        description: "Adversarial NLI Round 2"
      - name: anli_r3
        hf_id: Styxxxx/llama2_7b_lora-anli_r3
        description: "Adversarial NLI Round 3"
      - name: cb
        hf_id: Styxxxx/llama2_7b_lora-cb
        description: "CommitmentBank - textual entailment"
      - name: mnli_matched
        hf_id: Styxxxx/llama2_7b_lora-mnli_matched
        description: "MultiNLI matched - textual entailment"
      - name: mnli_mismatched
        hf_id: Styxxxx/llama2_7b_lora-mnli_mismatched
        description: "MultiNLI mismatched - cross-domain entailment"
      - name: qnli
        hf_id: Styxxxx/llama2_7b_lora-qnli
        description: "Question NLI - answer sentence selection"
      - name: rte
        hf_id: Styxxxx/llama2_7b_lora-rte
        description: "Recognizing Textual Entailment"
      - name: snli
        hf_id: Styxxxx/llama2_7b_lora-snli
        description: "Stanford NLI - textual entailment"
      - name: wnli
        hf_id: Styxxxx/llama2_7b_lora-wnli
        description: "Winograd NLI - pronoun-based entailment"

  paraphrase:
    metric: exact_match
    tasks:
      - name: glue_mrpc
        hf_id: Styxxxx/llama2_7b_lora-glue_mrpc
        description: "MRPC - paraphrase detection from news"
      - name: glue_qqp
        hf_id: Styxxxx/llama2_7b_lora-glue_qqp
        description: "QQP - Quora question pair similarity"
      - name: paws_wiki
        hf_id: Styxxxx/llama2_7b_lora-paws_wiki
        description: "PAWS-Wiki - adversarial paraphrase detection"
      - name: stsb
        hf_id: Styxxxx/llama2_7b_lora-stsb
        description: "STS Benchmark - semantic textual similarity"

  reading_comp_commonsense:
    metric: exact_match
    tasks:
      - name: cosmos_qa
        hf_id: Styxxxx/llama2_7b_lora-cosmos_qa
        description: "Cosmos QA - commonsense reading comprehension"
      - name: record
        hf_id: Styxxxx/llama2_7b_lora-record
        description: "ReCoRD - reading comprehension with entities"

  reading_comprehension:
    metric: exact_match
    tasks:
      - name: bool_q
        hf_id: Styxxxx/llama2_7b_lora-bool_q
        description: "BoolQ - boolean question answering"
      - name: drop
        hf_id: Styxxxx/llama2_7b_lora-drop
        description: "DROP - discrete reasoning over paragraphs"
      - name: multirc
        hf_id: Styxxxx/llama2_7b_lora-multirc
        description: "MultiRC - multi-sentence reading comprehension"
      - name: openbookqa
        hf_id: Styxxxx/llama2_7b_lora-openbookqa
        description: "OpenBookQA - open book science QA"
      - name: squad_v1
        hf_id: Styxxxx/llama2_7b_lora-squad_v1
        description: "SQuAD v1 - extractive question answering"
      - name: squad_v2
        hf_id: Styxxxx/llama2_7b_lora-squad_v2
        description: "SQuAD v2 - extractive QA with unanswerable"

  sentiment:
    metric: exact_match
    tasks:
      - name: imdb_reviews
        hf_id: Styxxxx/llama2_7b_lora-imdb_reviews
        description: "IMDB - movie review sentiment classification"
      - name: sentiment140
        hf_id: Styxxxx/llama2_7b_lora-sentiment140
        description: "Sentiment140 - Twitter sentiment analysis"
      - name: sst2
        hf_id: Styxxxx/llama2_7b_lora-sst2
        description: "SST-2 - Stanford sentiment treebank"
      - name: yelp_polarity_reviews
        hf_id: Styxxxx/llama2_7b_lora-yelp_polarity_reviews
        description: "Yelp reviews - polarity classification"

  struct_to_text:
    metric: rouge
    tasks:
      - name: common_gen
        hf_id: Styxxxx/llama2_7b_lora-common_gen
        description: "CommonGen - generative commonsense reasoning"
      - name: dart
        hf_id: Styxxxx/llama2_7b_lora-dart
        description: "DART - data-to-text generation"
      - name: e2e_nlg
        hf_id: Styxxxx/llama2_7b_lora-e2e_nlg
        description: "E2E NLG - end-to-end generation from MR"
      - name: web_nlg_en
        hf_id: Styxxxx/llama2_7b_lora-web_nlg_en
        description: "WebNLG English - RDF to text generation"

  translation:
    metric: bleu
    tasks:
      - name: para_crawl_enes
        hf_id: Styxxxx/llama2_7b_lora-para_crawl_enes
        description: "ParaCrawl EN-ES - English to Spanish translation"
      - name: wmt14_enfr
        hf_id: Styxxxx/llama2_7b_lora-wmt14_enfr
        description: "WMT14 EN-FR - English to French translation"
      - name: wmt16_translate_csen
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_csen
        description: "WMT16 CS-EN - Czech to English translation"
      - name: wmt16_translate_deen
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_deen
        description: "WMT16 DE-EN - German to English translation"
      - name: wmt16_translate_fien
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_fien
        description: "WMT16 FI-EN - Finnish to English translation"
      - name: wmt16_translate_roen
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_roen
        description: "WMT16 RO-EN - Romanian to English translation"
      - name: wmt16_translate_ruen
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_ruen
        description: "WMT16 RU-EN - Russian to English translation"
      - name: wmt16_translate_tren
        hf_id: Styxxxx/llama2_7b_lora-wmt16_translate_tren
        description: "WMT16 TR-EN - Turkish to English translation"

# Evaluation regimes
regimes:
  non_ood:
    description: "All 48 adapters available. Ground-truth adapter in pool."
    exclude_ground_truth: false
  semi_ood:
    description: "Adapter removed but task validation data remains for representation."
    exclude_ground_truth: true
    keep_task_data: true
  ood:
    description: "Ground-truth adapter fully removed from pool."
    exclude_ground_truth: true
    keep_task_data: false

# Baselines from literature (normalized oracle scores)
baselines:
  lorauter:
    non_ood: 101.2
    ood: 88.4
    source: "arXiv:2601.21795"
  lora_retriever:
    non_ood: 92.9
    ood: 83.2
    source: "ACL 2024, arXiv:2402.09997"
  arrow:
    non_ood: 82.5
    ood: 82.0
    source: "ICML 2024"
  spectr:
    non_ood: 74.2
    ood: 66.3
    source: "COLM 2025"
  lorahub:
    non_ood: 68.6
    ood: 67.8
    source: "COLM 2024"
