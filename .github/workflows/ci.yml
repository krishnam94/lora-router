name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check src/
      - name: Ruff format check
        run: ruff format --check src/
      - name: Type check
        run: mypy src/lora_router/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=lora_router --cov-report=term-missing
      - name: Check coverage threshold
        run: pytest tests/unit/ --cov=lora_router --cov-fail-under=80 -q

  verify:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fresh install from source
        run: pip install .
      - name: Verify import works
        run: python -c "from lora_router import LoRARouter, AdapterRegistry, AdapterInfo; print('Import OK')"
      - name: Verify version
        run: python -c "import lora_router; print(f'v{lora_router.__version__}')"
